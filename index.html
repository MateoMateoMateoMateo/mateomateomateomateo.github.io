<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Windows XP Chaos</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
body {
  margin: 0;
  font-family: Tahoma, Arial, sans-serif;
  background: #008080;
  overflow: hidden;
  color: white;
}

/* windows */
.window {
  position: absolute;
  background: #c0c0c0;
  border: 2px solid #000;
  box-shadow: 4px 4px #000;
}

.titlebar {
  background: linear-gradient(#000080, #0000cd);
  color: white;
  padding: 4px;
  cursor: grab;
  font-size: 14px;
}

.content {
  padding: 10px;
  color: black;
}

/* taskbar */
#taskbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 30px;
  background: #c0c0c0;
  border-top: 2px solid #fff;
}

/* dvd */
#dvd {
  position: fixed;
  width: 100px;
  height: 40px;
  background: yellow;
  color: black;
  text-align: center;
  line-height: 40px;
  font-weight: bold;
}

/* cat */
#cat {
  position: fixed;
  font-size: 30px;
  pointer-events: none;
}

/* start button */
#start {
  position: absolute;
  left: 5px;
  top: 5px;
  background: green;
  color: white;
  padding: 3px 10px;
  cursor: pointer;
}

/* popup */
.popup {
  position: absolute;
  background: white;
  border: 2px solid black;
  padding: 10px;
  color: black;
}

button {
  cursor: pointer;
}
</style>
</head>

<body>

<div id="dvd">DVD</div>
<div id="cat">🐱</div>

<div class="window" style="top:50px;left:50px;width:400px;">
  <div class="titlebar">Internet Explorer.exe</div>
  <div class="content">
    <iframe width="100%" height="200"
    src="https://www.youtube.com/embed/DLzxrzFCyOs?autoplay=1"></iframe>

    <h1 class="animate__animated animate__bounce">T'boli stuff here</h1>
    <h1>who cares if ts looks bad its a personal site xDDDDD</h1>
    <h3>- - - - - - - - - - - - -- - adrian</h3>
    <h1>hellwo! :3</h1>
    <h1>i genuienly suck at spelling and coding :sob:</h1>
    <h1>castiel was here</h1>
    <h1>Hi</h1>
    <h1>Hi</h1>
    <h1>Hi</h1>
    <h1>Hi</h1>
  </div>
</div>

<div id="taskbar">
  <div id="start">Start</div>
</div>

<audio autoplay loop>
<source src="https://www.myinstants.com/media/sounds/trololo.mp3">
</audio>

<script>
// DRAG WINDOWS
document.querySelectorAll(".window").forEach(win=>{
  let bar = win.querySelector(".titlebar");

  bar.onmousedown = function(e){
    let shiftX = e.clientX - win.offsetLeft;
    let shiftY = e.clientY - win.offsetTop;

    function moveAt(x,y){
      win.style.left = x - shiftX + "px";
      win.style.top = y - shiftY + "px";
    }

    function onMove(e){
      moveAt(e.pageX,e.pageY);
    }

    document.addEventListener("mousemove", onMove);

    document.onmouseup = ()=>{
      document.removeEventListener("mousemove", onMove);
      document.onmouseup=null;
    }
  }
});

// DVD bounce
let dvd=document.getElementById("dvd");
let x=100,y=100,dx=3,dy=3;

function moveDVD(){
  let w=innerWidth;
  let h=innerHeight;
  x+=dx; y+=dy;

  if(x+100>w||x<0) dx*=-1;
  if(y+40>h||y<0) dy*=-1;

  dvd.style.left=x+"px";
  dvd.style.top=y+"px";

  requestAnimationFrame(moveDVD);
}
moveDVD();

// CAT FOLLOW
let cat=document.getElementById("cat");
document.addEventListener("mousemove", e=>{
  cat.style.left = e.clientX + 10 + "px";
  cat.style.top = e.clientY + 10 + "px";
});

// RANDOM POPUPS
function createPopup(){
  let p=document.createElement("div");
  p.className="popup";
  p.style.left=Math.random()*innerWidth+"px";
  p.style.top=Math.random()*innerHeight+"px";
  p.innerHTML="⚠️ virus detected also castiels-snake-game.netlify.app/<br><button>ok</button>";
  p.querySelector("button").onclick=()=>p.remove();
  document.body.appendChild(p);
}

setInterval(createPopup,7000);

// START BUTTON CHAOS
document.getElementById("start").onclick=()=>{
  for(let i=0;i<5;i++) createPopup();
};

// CLICK SPAM EFFECT
document.addEventListener("click",e=>{
  let spark=document.createElement("div");
  spark.style.position="fixed";
  spark.style.left=e.clientX+"px";
  spark.style.top=e.clientY+"px";
  spark.innerText="✨";
  document.body.appendChild(spark);
  setTimeout(()=>spark.remove(),1000);
});

// RANDOM WINDOW SPAWNER
setInterval(()=>{
  let w=document.createElement("div");
  w.className="window";
  w.style.top=Math.random()*300+"px";
  w.style.left=Math.random()*300+"px";
  w.style.width="200px";

  w.innerHTML=`
  <div class="titlebar">error.exe</div>
  <div class="content">something broke lol</div>
  `;
  document.body.appendChild(w);
},12000);

// SCREEN SHAKE
setInterval(()=>{
  document.body.style.transform="translate("+(Math.random()*5-2)+"px,"+(Math.random()*5-2)+"px)";
  setTimeout(()=>document.body.style.transform="",100);
},5000);

// TITLE CHAOS
const titles=["Windows XP","virus???","adrian core","help","real"];
setInterval(()=>{
  document.title=titles[Math.floor(Math.random()*titles.length)];
},2000);

</script>

</body>
</html>
