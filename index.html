<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>chaos</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
body {
  margin: 0;
  font-family: "Comic Sans MS", cursive;
  background: linear-gradient(270deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
  background-size: 800% 800%;
  animation: gradientShift 20s ease infinite;
  overflow: hidden;
  color: white;
  text-shadow: 2px 2px 4px black;
}

@keyframes gradientShift {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

h1,h2,h3 {
  text-align:center;
  cursor:grab;
}

iframe {
  display:block;
  margin:auto;
  border-radius:20px;
  box-shadow:0 0 30px white;
  cursor:grab;
}

/* dvd logo */
#dvd {
  position:fixed;
  width:120px;
  top:100px;
  left:100px;
  font-size:20px;
  font-weight:bold;
  color:black;
  background:white;
  padding:10px;
  border-radius:10px;
}

/* virus popup */
#virus {
  position:fixed;
  top:30%;
  left:30%;
  background:black;
  color:red;
  padding:20px;
  border:3px solid red;
  display:none;
  z-index:9999;
}

/* mini game */
#game {
  position:fixed;
  bottom:10px;
  right:10px;
  background:black;
  padding:10px;
  border:2px solid white;
}

#target {
  width:50px;
  height:50px;
  background:red;
  position:absolute;
  cursor:pointer;
}
</style>
</head>

<body>

<audio autoplay loop>
<source src="https://www.myinstants.com/media/sounds/trololo.mp3">
</audio>

<div id="virus">
⚠️ VIRUS DETECTED ⚠️<br>
Deleting system32...<br>
Just kidding lol 😭<br>
<button onclick="document.getElementById('virus').style.display='none'">close</button>
</div>

<div id="dvd">DVD</div>

<iframe width="400" height="300"
src="https://www.youtube.com/embed/DLzxrzFCyOs?autoplay=1">
</iframe>

<h1 class="animate__animated animate__bounce">T'boli stuff here</h1>
<h1>who cares if ts looks bad its a personal site xDDDDD</h1>
<h3>- - - - - - - - - - - - -- - adrian</h3>
<h1>hellwo! :3</h1>
<h1>i genuienly suck at spelling and coding :sob:</h1>
<h1>Hi</h1>
<h1>Hi</h1>
<h1>Hi</h1>
<h1>Hi</h1>

<div id="game">
score: <span id="score">0</span>
<div id="target"></div>
</div>

<script>
// DRAG EVERYTHING
document.querySelectorAll("h1,h2,h3,iframe,#dvd").forEach(el=>{
  el.onmousedown = function(e){
    let shiftX = e.clientX - el.getBoundingClientRect().left;
    let shiftY = e.clientY - el.getBoundingClientRect().top;

    function moveAt(pageX, pageY){
      el.style.position='absolute';
      el.style.left = pageX - shiftX + 'px';
      el.style.top = pageY - shiftY + 'px';
    }

    function onMouseMove(e){
      moveAt(e.pageX, e.pageY);
    }

    document.addEventListener('mousemove', onMouseMove);
    document.onmouseup = function(){
      document.removeEventListener('mousemove', onMouseMove);
      document.onmouseup = null;
    }
  }
});

// DVD LOGO PHYSICS
let dvd = document.getElementById("dvd");
let x=100,y=100,dx=2,dy=2;

function moveDVD(){
  let w=window.innerWidth;
  let h=window.innerHeight;

  x+=dx;
  y+=dy;

  if(x+120>w||x<0) dx*=-1;
  if(y+50>h||y<0) dy*=-1;

  dvd.style.left=x+"px";
  dvd.style.top=y+"px";

  requestAnimationFrame(moveDVD);
}
moveDVD();

// RANDOM VIRUS POPUP
setInterval(()=>{
  document.getElementById("virus").style.display="block";
},15000);

// MINI GAME
let score=0;
let target=document.getElementById("target");

function moveTarget(){
  target.style.left=Math.random()*200+"px";
  target.style.top=Math.random()*200+"px";
}

target.onclick=()=>{
  score++;
  document.getElementById("score").innerText=score;
  moveTarget();
}

moveTarget();
</script>

</body>
</html>
